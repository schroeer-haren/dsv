name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (tsup)
        run: npm run build

      - name: Lint (ESLint)
        run: npm run lint

      - name: Typecheck (TypeScript)
        run: npm run typecheck

      - name: Check API surface snapshot
        run: npm run api-surface:check

      - name: Test (Vitest)
        run: npm test

      - name: Lint package (publint)
        run: npm run publint

      - name: Check type resolution (attw)
        run: npm run attw
